# Render Blueprint: https://docs.render.com/blueprint-spec
# Connect this repo in Render → New → Blueprint → select render.yaml (or paste contents).
version: "1"
services:
  - type: web
    name: company-intelligence-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 300 wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_API_URL
        value: https://api.openai.com/v1/chat/completions
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: LLM_API_KEY
        sync: false
      - key: PIPELINE_USE_THREADS
        value: "true"
