# Railway config-as-code: https://docs.railway.com/guides/config-as-code
# Default builder is Railpack; omit [build] unless you switch to Dockerfile.
[deploy]
startCommand = "gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 180 wsgi:app"
healthcheckPath = "/api/companies"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
