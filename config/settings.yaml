paths:
  data_dir: "data"
  output_dir: "output"
  logs_dir: "logs"

downloader:
  # Preferred depth for httrack / wget recursion
  depth: 3
  # Optional explicit paths to httrack / wget; leave empty to use PATH lookup
  httrack_path: ""
  wget_path: ""
  # Timeout per domain download (seconds)
  timeout_seconds: 600

parallel:
  workers: 0
  parallel_llm: true

# LLM — overridden by environment variables on Render/Railway (see .env.example)
llm:
  # ollama = local/remote Ollama | openai = OpenAI-compatible HTTP API
  provider: ollama
  model: llama3
  temperature: 0.0
  api_url: "http://localhost:11434/api/chat"
  api_key: ""
